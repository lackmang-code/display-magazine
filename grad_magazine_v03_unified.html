h1,h2,h3{font-weight:700;color:#000}

/* ════════════════════════════════
   공통 컴포넌트
════════════════════════════════ */
.db{height:4px;background:#000;margin-bottom:10px}
.dt{height:1px;background:#e0e0e0;margin:12px 0}
.label{font-size:11px;font-weight:700;color:#d93025;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:10px}
.body-txt{font-size:14.5px;line-height:1.85;color:#333;word-break:keep-all;text-align:justify}
.body-txt p{margin-bottom:12px}
.body-txt p:last-child{margin-bottom:0}
.note{padding-left:12px;border-left:3px solid #000}
.note h3{font-size:1rem;margin-bottom:6px;color:#333}
.note p{font-size:13.5px;font-style:italic;color:#555;line-height:1.75}
.toc-list{list-style:none}
.toc-item{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px dotted #ccc;font-size:14.5px}
.toc-item:last-child{border-bottom:none}
.toc-num{font-size:11px;color:#bbb;margin-right:7px;flex-shrink:0}
.toc-article{flex-grow:1;word-break:keep-all}
.toc-page{font-weight:700;color:#888;font-size:12px;margin-left:8px;flex-shrink:0}
.img-portrait{aspect-ratio:3/4;object-fit:cover;border-radius:4px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#f7f5f1;border-radius:7px;cursor:pointer;user-select:none;border:1px solid #e8e4de;margin-bottom:4px;-webkit-tap-highlight-color:transparent}
.acc-hdr:hover{background:#f0ece4}
.acc-hdr span:first-child{font-size:14px;font-weight:700;color:#111}
.acc-body{display:none;border:1px solid #e8e4de;border-top:none;border-radius:0 0 7px 7px;overflow:hidden;margin-bottom:4px}
.acc-body.open{display:block}
.acc-row{padding:7px 11px;border-bottom:1px solid #f5f3ef;background:#fff}
.acc-row:last-child{border-bottom:none}
.sum-cards{display:flex;gap:6px;margin-bottom:12px}
.sum-card{flex:1;border-radius:7px;padding:9px;text-align:center}
.sum-num{font-size:18px;font-weight:700}
.sum-lbl{font-size:10px;margin-top:2px}
.pat-card{background:#fff;border:1px solid #e8e4de;border-radius:8px;padding:10px 12px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pat-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-right:4px;margin-bottom:5px}

/* ════════════════════════════════
   가로 모드 (책 레이아웃)
════════════════════════════════ */
@media (orientation:landscape),(min-width:768px){
  body{background:#c8bfb0}

  .book-nav button{background:#3a3228;border:none;border-radius:6px;padding:7px 18px;font-size:13px;color:#f5f0e8;cursor:pointer;font-family:inherit;transition:background .2s}
  .book-nav button:hover{background:#5a4e43}

  .book-spread-info{font-size:12px;color:#4a3f35;min-width:120px;text-align:center;font-weight:600}

  /* 책 */
  .book-wrap{width:100%;max-width:1100px;align-self:center;flex:1;display:flex;align-items:center;padding:0 10px 10px}

  .page-left{flex:1;background:#fdf9f3;overflow:hidden;position:relative;border-radius:4px 0 0 4px;box-shadow:inset -10px 0 20px rgba(0,0,0,.08), 2px 0 6px rgba(0,0,0,.12)}
  .page-right{flex:1;background:#fdf9f3;overflow:hidden;position:relative;border-radius:0 4px 4px 0;box-shadow:inset 10px 0 20px rgba(0,0,0,.08), -2px 0 6px rgba(0,0,0,.12)}

  .page-placeholder-r{flex:1;background:#b8af9f;border-radius:0 4px 4px 0;box-shadow:inset 8px 0 16px rgba(0,0,0,.06)}
  .cover-front{flex:1;border-radius:0 4px 4px 0;background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);display:flex;flex-direction:column;justify-content:space-between;padding:36px 28px;position:relative}
  .cover-back{flex:1;border-radius:4px 0 0 4px;background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);display:flex;flex-direction:column;justify-content:space-between;padding:36px 28px;position:relative}
  .spine{width:0;flex-shrink:0}
  .bp{padding:24px 20px 44px;height:770px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .bpg{position:absolute;bottom:10px;font-size:11px;color:#bbb}
  .bpg-l{left:14px}.bpg-r{right:14px}
  .b-sec-title{font-size:1.5rem;line-height:1.3;margin-bottom:10px}
  .b-portrait{width:88px}

  /* 폰 UI 숨김 */
  .phone-nav,.phone-wrap,.phone-dots{display:none!important}
}

/* ════════════════════════════════
   세로 모드 (폰 레이아웃)
════════════════════════════════ */
@media (orientation:portrait) and (max-width:767px){
  body{background:#e8e8e8}

  /* 네비 */
  .phone-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#000;flex-shrink:0}
  .phone-nav button{background:transparent;border:1px solid #fff;border-radius:6px;padding:0 14px;height:36px;min-width:60px;font-size:13px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
  .phone-nav button:disabled{opacity:.25}
  .phone-nav button:active{background:#333}
  .pinfo{font-size:11px;color:#aaa;text-align:center;letter-spacing:.5px;line-height:1.3}

  /* 페이지 */
  .phone-wrap{flex:1;display:flex;justify-content:center;padding:12px 14px 4px;overflow:hidden;min-height:0}
  .phone-page{display:none;background:#fff;border-radius:12px;border:1px solid #ccc;box-shadow:0 2px 12px rgba(0,0,0,.1);width:100%;max-width:560px;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
  .phone-page.active{display:block}
  .pp{padding:20px 18px 48px}
  .ppg{position:absolute;bottom:12px;right:16px;font-size:11px;color:#bbb}
  .phone-dots{display:flex;justify-content:center;align-items:center;gap:8px;height:36px;flex-shrink:0;background:#e8e8e8}
  .phone-dot{width:8px;height:8px;border-radius:50%;background:#bbb;border:none;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .2s}
  .phone-dot.active{background:#111;transform:scale(1.2)}
  .p-sec-title{font-size:1.4rem;line-height:1.3;margin-bottom:8px}
  .p-portrait{width:80px}
  .body{font-size:15px;line-height:1.85;color:#333;word-break:keep-all;text-align:justify}
  .body p{margin-bottom:12px}
  .body p:last-child{margin-bottom:0}
  .note h3{font-size:1.05rem;margin-bottom:6px;color:#333}
  .note p{font-size:14.5px;font-style:italic;color:#555;line-height:1.75}

  /* 책 UI 숨김 */
  .book-nav,.book-wrap{display:none!important}
}

function buildAccHTML(grouped,isConf){
  let html='';
  Object.keys(grouped).sort().forEach(key=>{
    const items=grouped[key];
    const id='ac'+Math.random().toString(36).slice(2,8);
    html+=`<div><div class="acc-hdr" onclick="toggleAcc('${id}')">
      <span>${key} <span style="font-size:12px;color:#aaa;font-weight:400">${items.length}건</span></span>
      <span id="arr_${id}" style="font-size:10px;color:#aaa;transition:transform .2s">▼</span>
    </div><div class="acc-body" id="${id}">`;
    items.forEach(item=>{
      const meta=isConf?`발표자: ${item.presenter} · ${item.conf} · ${item.date}`:`${item.journal} · ${item.issue} · ${item.date}`;
      const badge=isConf
        ?`<span style="font-size:8px;padding:1px 5px;background:#e6f4ea;color:#1a7a3a;border-radius:3px;border:1px solid #a8d8b8;flex-shrink:0;margin-top:2px">발표</span>`
        :`<span style="font-size:8px;padding:1px 5px;background:#e8f0fb;color:#1a56a0;border-radius:3px;border:1px solid #b3ccf0;flex-shrink:0;margin-top:2px">SCIE</span>`;
      const titleEl=isConf
        ?`<span style="font-size:10px;font-weight:600;color:#333;line-height:1.4;word-break:break-word">${item.title}</span>`
        :`<a href="https://scholar.google.com/scholar?q=${encodeURIComponent(item.title)}" target="_blank" style="font-size:10px;font-weight:600;color:#1a56a0;text-decoration:none;line-height:1.4;word-break:break-word">${item.title}</a>`;
      html+=`<div class="acc-row"><div style="display:flex;gap:4px;align-items:flex-start;margin-bottom:2px">${badge}${titleEl}</div><div style="font-size:9px;color:#888;padding-left:25px;line-height:1.4">${meta}</div></div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}

/* 폰 네비 */
let phoneCur=0;
const phoneDotsEl=document.getElementById('phone-dots');

function initPhoneDots(){
  phonePages.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='phone-dot'+(i===0?' active':'');
    d.onclick=()=>phoneJump(i);
    phoneDotsEl.appendChild(d);
  });
}
function phoneJump(i){
  document.getElementById(phonePages[phoneCur].id).classList.remove('active');
  document.querySelectorAll('.phone-dot')[phoneCur].classList.remove('active');
  phoneCur=i;
  const el=document.getElementById(phonePages[phoneCur].id);
  el.classList.add('active');el.scrollTop=0;
  document.querySelectorAll('.phone-dot')[phoneCur].classList.add('active');
  document.getElementById('pinfo').textContent=phonePages[phoneCur].label;
  document.getElementById('p-btn-prev').disabled=phoneCur===0;
  document.getElementById('p-btn-next').disabled=phoneCur===phonePages.length-1;
  // 책과 동기화
  bookSyncFromPhone(i);
}
function phoneGo(d){phoneJump(Math.min(Math.max(phoneCur+d,0),phonePages.length-1));}

/* 페이지 동기화 테이블
   폰 페이지 0~8 → 책 스프레드 0~5
*/
const phoneToSpread=[0,1,1,2,2,3,3,4,5];
const spreadToPhone=[0,1,3,5,7,8];
function bookSyncFromPhone(pi){bookCur=phoneToSpread[pi];}
function phoneSyncFromBook(si){
  const pi=spreadToPhone[si];
  phoneCur=pi;
  document.getElementById('pinfo').textContent=phonePages[pi].label;
  document.getElementById('p-btn-prev').disabled=pi===0;
  document.getElementById('p-btn-next').disabled=pi===phonePages.length-1;
}

/* 전체화면 */
function toggleFS(){
  const btn1=document.getElementById('btn-fs'),btn2=document.getElementById('p-btn-fs');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    if(btn1)btn1.textContent='종료';if(btn2)btn2.textContent='종료';
  }else{
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
    if(btn1)btn1.textContent='전체화면';if(btn2)btn2.textContent='전체화면';
  }
}
document.addEventListener('fullscreenchange',()=>{const f=!!document.fullscreenElement;['btn-fs','p-btn-fs'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent=f?'종료':'전체화면';});});
document.addEventListener('webkitfullscreenchange',()=>{const f=!!document.webkitFullscreenElement;['btn-fs','p-btn-fs'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent=f?'종료':'전체화면';});});

function toggleAcc(id){
  const b=document.getElementById(id),arr=document.getElementById('arr_'+id);
  if(!b)return;
  const open=b.classList.toggle('open');
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
  const hdr=b.previousElementSibling;
  if(hdr)hdr.style.borderRadius=open?'7px 7px 0 0':'7px';
}

/* 초기화 */
